<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - TravelGo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">TravelGo</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html" class="active">Contact Us</a></li>
    </ul>
    <div class="nav-search">
      <input type="text" id="search-input" placeholder="Search destinations...">
      <button id="search-btn" type="button" onclick="window.location.href='index.html?q='+encodeURIComponent(document.getElementById('search-input').value)">Search</button>
      <button id="clear-btn" type="button" onclick="document.getElementById('search-input').value=''">Clear</button>
    </div>
  </nav>

  <main class="contact">
    <h1>Contact Us</h1>
    <p>Have a question or want to share a destination? Send us a message and we will get back to you.</p>

    <form id="contact-form" class="contact-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>

      <button type="submit" class="btn-submit">Send Message</button>
    </form>

    <p id="form-status" aria-live="polite"></p>
  </main>

  <footer>
    <p>&copy; 2026 TravelGo. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
