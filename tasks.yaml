apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: npm
spec:
  params:
    - name: args
      description: The npm command arguments
      type: array
      default: ["--version"]
  workspaces:
    - name: source
  steps:
    - name: npm
      image: node:18-alpine
      workingDir: $(workspaces.source.path)
      command: ["npm"]
      args: ["$(params.args[*])"]
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jasmine
spec:
  workspaces:
    - name: source
  steps:
    - name: jasmine
      image: node:18-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env sh
        set -e
        npm install
        npx jasmine
